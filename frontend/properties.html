<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties - HomeHunt</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                Home<span>Hunt</span>
            </a>
            <ul class="nav-links" id="nav-links">
                <!-- Populated by JS -->
            </ul>
        </nav>
    </header>

    <main>
        <div class="card mb-2" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <h2>All Properties</h2>
            <div style="display: flex; gap: 1rem;">
                <input type="text" id="search" placeholder="Search by location..." style="padding: 0.5rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(15, 23, 42, 0.5); color: white;">
                <button class="btn-primary" onclick="filterProperties()">Filter</button>
            </div>
        </div>

        <div class="property-grid" id="all-properties">
            <div class="text-center" style="grid-column: 1/-1;">Loading properties...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 HomeHunt. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script>
        let allProps = [];

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                allProps = await Api.getProperties();
                renderProperties(allProps);
            } catch (error) {
                document.getElementById('all-properties').innerHTML = '<p class="text-center text-muted" style="grid-column: 1/-1;">Could not load properties.</p>';
            }
        });

        function renderProperties(properties) {
            const grid = document.getElementById('all-properties');
            if (properties.length === 0) {
                grid.innerHTML = '<p class="text-center" style="grid-column: 1/-1;">No properties found.</p>';
                return;
            }

            grid.innerHTML = properties.map(p => `
                <div class="property-card">
                    <img src="${p.image_url ? 'http://localhost/HomeHunt2/' + p.image_url : 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60'}" alt="${p.title}" class="property-image">
                    <div class="property-info">
                        <div class="property-price">$${Number(p.price).toLocaleString()}</div>
                        <h3 class="property-title">${p.title}</h3>
                        <div class="property-location">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            ${p.location}
                        </div>
                        <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 1rem;">Listed by: ${p.seller_name}</p>
                        <a href="#" onclick="alert('Viewing Details for Property ${p.id}')" class="btn-primary" style="display: block; text-align: center;">View Details</a>
                    </div>
                </div>
            `).join('');
        }

        function filterProperties() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = allProps.filter(p => p.location.toLowerCase().includes(term) || p.title.toLowerCase().includes(term));
            renderProperties(filtered);
        }
    </script>
</body>
</html>
